name: Secret Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for all branches and tags
    
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Optional: for Gitleaks Pro
    
    - name: Run TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified

  detect-secrets:
    name: Detect Secret Patterns
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install detect-secrets
      run: |
        pip install detect-secrets
    
    - name: Run detect-secrets scan
      run: |
        detect-secrets scan --all-files --force-use-all-plugins > .secrets.baseline
        
    - name: Audit results
      run: |
        if [ -f .secrets.baseline ]; then
          echo "Checking for potential secrets..."
          if grep -q "results" .secrets.baseline; then
            echo "⚠️ Potential secrets detected! Review the results below:"
            cat .secrets.baseline
            # Don't fail the build, just warn
          else
            echo "✅ No secrets detected"
          fi
        fi

  token-pattern-check:
    name: Check for Common Token Patterns
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check for Slack tokens
      run: |
        echo "Checking for Slack token patterns..."
        if git grep -E "(xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,32}|xoxe\.xoxp-1-[a-zA-Z0-9-]+|xoxe-1-[a-zA-Z0-9-]+)" -- ':!*.md' ':!.github/workflows/*'; then
          echo "❌ ERROR: Slack token pattern detected!"
          echo "Please remove the token and revoke it immediately."
          exit 1
        fi
        echo "✅ No Slack tokens detected"
    
    - name: Check for GitHub tokens
      run: |
        echo "Checking for GitHub token patterns..."
        if git grep -E "ghp_[a-zA-Z0-9]{36}" -- ':!*.md' ':!.github/workflows/*' || \
           git grep -E "gho_[a-zA-Z0-9]{36}" -- ':!*.md' ':!.github/workflows/*' || \
           git grep -E "ghu_[a-zA-Z0-9]{36}" -- ':!*.md' ':!.github/workflows/*' || \
           git grep -E "ghs_[a-zA-Z0-9]{36}" -- ':!*.md' ':!.github/workflows/*' || \
           git grep -E "ghr_[a-zA-Z0-9]{36}" -- ':!*.md' ':!.github/workflows/*'; then
          echo "❌ ERROR: GitHub token pattern detected!"
          echo "Please remove the token and revoke it immediately."
          exit 1
        fi
        echo "✅ No GitHub tokens detected"
    
    - name: Check for AWS keys
      run: |
        echo "Checking for AWS key patterns..."
        if git grep -E "AKIA[0-9A-Z]{16}" -- ':!*.md' ':!.github/workflows/*' || \
           git grep -E "ASIA[0-9A-Z]{16}" -- ':!*.md' ':!.github/workflows/*'; then
          echo "❌ ERROR: AWS key pattern detected!"
          echo "Please remove the key and revoke it immediately."
          exit 1
        fi
        echo "✅ No AWS keys detected"
    
    - name: Check for generic API keys
      run: |
        echo "Checking for generic API key patterns..."
        if git grep -iE "(api[_-]?key|apikey|api[_-]?secret|password|passwd|pwd)[\s]*[:=][\s]*['\"][a-zA-Z0-9_\-]{20,}['\"]" -- ':!*.md' ':!.github/workflows/*' ':!SECURITY.md' ':!*.example' || \
           git grep -iE "(['\"][a-zA-Z0-9_\-]{32,}['\"].*(token|secret|key|password|auth))|((token|secret|key|password|auth).*\s*['\"][a-zA-Z0-9_\-]{32,}['\"])" -- ':!*.md' ':!.github/workflows/*' ':!package*.json' ':!SECURITY.md' ':!*.example'; then
          echo "⚠️ WARNING: Potential API key or secret pattern detected!"
          echo "Please review the detected patterns manually."
          # Don't fail the build for this one, just warn
        else
          echo "✅ No obvious API keys detected"
        fi
    
    - name: Summary
      if: success()
      run: |
        echo "🎉 Secret scanning completed successfully!"
        echo ""
        echo "Remember:"
        echo "- Never commit tokens or secrets"
        echo "- Use .env files (excluded by .gitignore)"
        echo "- Store secrets in GitHub Secrets for CI/CD"
        echo "- If you accidentally commit a secret, revoke it immediately"
