# Example secrets file - DO NOT commit actual secrets to git
# Create actual secrets using: kubectl create secret generic github-mcp-secrets --from-literal=github-token=YOUR_TOKEN

apiVersion: v1
kind: Secret
metadata:
  name: github-mcp-secrets
type: Opaque
stringData:
  github-token: "YOUR_GITHUB_TOKEN_HERE"
  slack-bot-token: "YOUR_SLACK_BOT_TOKEN_HERE"
  slack-signing-secret: "YOUR_SLACK_SIGNING_SECRET_HERE"
  jira-api-token: "YOUR_JIRA_API_TOKEN_HERE"
  aws-access-key: "YOUR_AWS_ACCESS_KEY_HERE"
  aws-secret-key: "YOUR_AWS_SECRET_KEY_HERE"
