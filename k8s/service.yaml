apiVersion: v1
kind: Service
metadata:
  name: github-mcp-service
  labels:
    app: github-mcp-server
spec:
  type: LoadBalancer
  selector:
    app: github-mcp-server
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
